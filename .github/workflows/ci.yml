name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          NODE_ENV: production
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
          SHOPIFY_SCOPES: read_products,write_products,read_script_tags,write_script_tags,read_discounts,write_discounts,read_orders
          SHOPIFY_APP_URL: https://placeholder.up.railway.app
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fbt_test
          SESSION_SECRET: ci-test-secret-not-real
          WIDGET_CDN_URL: https://placeholder.up.railway.app/widget